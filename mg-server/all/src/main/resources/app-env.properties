# QPS
request.permitsPerSecond=4000000
# 清理本阶段警告的时间间隔，参考值1000 * 60 * 60 * 2，单位为ms
request.warnClearInterval=300
# 本阶段最多警告多次数，参考值10
request.maxWarnCount=5000000
# 一共最多警告多次数
request.maxAllWarnCount=200000
#前面多少条消息不计入令牌桶
skip.warn.count = 80000000

