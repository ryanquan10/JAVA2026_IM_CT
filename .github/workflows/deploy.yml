name: CI/CD - Build & Deploy via Self-Hosted Runner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debian
          - ubuntu

jobs:
  build:
    name: Build (Java + Vue)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mg-page/package-lock.json

      - name: Configure Maven Settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>aliyun-central</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven Central</name>
                <url>https://maven.aliyun.com/nexus/content/groups/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Install Local Dependencies
        run: |
          mvn install:install-file -Dfile=lib/aplus-captcha-10.8.8.jar -DgroupId=org.aplus -DartifactId=aplus-captcha -Dversion=10.8.8 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/5upay-sdk-core-1.0.0.jar -DgroupId=org.t-io -DartifactId=5upay-sdk-core -Dversion=1.0.0 -Dpackaging=jar

      - name: Build Backend  (Maven)
        run: |
          cd tio/src/parent
          mvn clean install -DskipTests -Dmaven.javadoc.skip=true -B -e -Dmaven.wagon.http.ssl.insecure=true -Dmaven.wagon.http.ssl.allowall=true -Dmaven.resolver.transport=wagon
          cd ../../../bs-server/parent
          mvn clean install -DskipTests -Dmaven.javadoc.skip=true -B -e -Dmaven.wagon.http.ssl.insecure=true -Dmaven.wagon.http.ssl.allowall=true -Dmaven.resolver.transport=wagon

      - name: Build Frontend (Vue.js)
        run: |
          cd mg-page
          npm ci --legacy-peer-deps
          npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            mg-page/dist/
            bs-server/all/target/
          retention-days: 7
          compression-level: 1

  deploy-debian:
    name: Deploy to Debian WSL
    needs: build
    runs-on:
      - self-hosted
      - debian

    steps:
      - name: Pull latest code
        run: |
          cd /home/debianuser/CT_IM_JAVA
          git pull origin main

      - name: Configure Docker Mirrors
        run: |
          cd /home/debianuser/CT_IM_JAVA
          bash docker/configure-docker-mirrors.sh
        continue-on-error: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: /home/debianuser/CT_IM_JAVA/build-artifacts/

      - name: Prepare Build Artifacts
        run: |
          cd /home/debianuser/CT_IM_JAVA
          echo "=== Checking build-artifacts ==="
          ls -la build-artifacts/ || echo "Not found"
          find build-artifacts -name "*.jar" || echo "No JARs"
          echo "=== Preparing ==="
          mkdir -p docker/backend-jar
          find build-artifacts -name "tio-site-all-*.jar" -exec cp {} docker/backend-jar/tio-site-all.jar \;
          if [ -d "build-artifacts/mg-page/dist" ]; then
            mkdir -p docker/frontend-dist
            cp -r build-artifacts/mg-page/dist/* docker/frontend-dist/
          fi
          echo "=== Verifying ==="
          ls -la docker/backend-jar/ docker/frontend-dist/ || true

      - name: Deploy (Docker)
        run: |
          cd /home/debianuser/CT_IM_JAVA
          bash docker/deploy.sh

  deploy-ubuntu:
    name: Deploy to Ubuntu-1 WSL
    needs: build
    runs-on:
      - self-hosted
      - wsl-ubuntu

    steps:
      - name: Pull latest code
        run: |
          cd /root/CT_IM_JAVA
          git pull origin main

      - name: Install Docker if needed
        run: |
          cd /root/CT_IM_JAVA
          bash docker/install-docker.sh
        continue-on-error: true

      - name: Configure Docker Mirrors
        run: |
          cd /root/CT_IM_JAVA
          bash docker/configure-docker-mirrors.sh
        continue-on-error: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: /root/CT_IM_JAVA/build-artifacts/

      - name: Prepare Build Artifacts
        run: |
          cd /root/CT_IM_JAVA
          mkdir -p docker/backend-jar
          find build-artifacts -name "tio-site-all-*.jar" -exec cp {} docker/backend-jar/tio-site-all.jar \;
          if [ -d "build-artifacts/mg-page/dist" ]; then
            mkdir -p docker/frontend-dist
            cp -r build-artifacts/mg-page/dist/* docker/frontend-dist/
          fi

      - name: Deploy (Docker)
        run: |
          cd /root/CT_IM_JAVA
          bash docker/deploy.sh
