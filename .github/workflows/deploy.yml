deploy-debian:
  name: Deploy to Debian WSL
  needs: build
  runs-on:
    - self-hosted
    - debian

  steps:
    - name: Pull latest code
      run: |
        cd /home/debianuser/CT_IM_JAVA
        git pull origin main

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-${{ github.sha }}
        path: /home/debianuser/CT_IM_JAVA/build-artifacts/

    - name: Configure Docker Mirrors
      run: bash /home/debianuser/CT_IM_JAVA/docker/configure-docker-mirrors.sh
      continue-on-error: true

    - name: Deploy (Docker)
      run: |
        cd /home/debianuser/CT_IM_JAVA
        bash docker/deploy.sh

deploy-ubuntu:
  name: Deploy to Ubuntu-1 WSL
  needs: build
  runs-on:
    - self-hosted
    - wsl-ubuntu

  steps:
    - name: Pull latest code
      run: |
        cd /root/CT_IM_JAVA
        git pull origin main

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-${{ github.sha }}
        path: /root/CT_IM_JAVA/build-artifacts/

    - name: Install Docker if needed
      run: bash /root/CT_IM_JAVA/docker/install-docker.sh
      continue-on-error: true

    - name: Configure Docker Mirrors
      run: bash /root/CT_IM_JAVA/docker/configure-docker-mirrors.sh
      continue-on-error: true

    - name: Deploy (Docker)
      run: |
        cd /root/CT_IM_JAVA
        bash docker/deploy.sh