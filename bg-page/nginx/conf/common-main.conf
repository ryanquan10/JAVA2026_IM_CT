# 访问 nginx本地  (以"/res/xxxx/"开头的访问nginx本地，其中xxxx是变量)
location ~ /res/.+/.*$ {
    etag on;
    root $pages_dir;
    error_page 404 =200 /2/error/page404.html;
    error_page 500 502 503 504 =200 /2/error/page502.html;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    expires 12h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}


# 访问 http_server_view
location ~ .*\.(js|css|html|htm)(.*) {
    proxy_pass $http_server_view;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    index index.html index.htm;
    proxy_set_header x-real-ip $remote_addr;
    proxy_set_header x-forwarded-for $proxy_add_x_forwarded_for;
    proxy_set_header host $http_host;
}
# 访问 http_server_view
location ~ .*\.(html|htm)(.*) {
    add_header Cache-Control no-store;
}

location /h5/wx {
    alias $pages_dir/h5/wx;
    index index.html;
    try_files $uri $uri/ /h5/wx/index.html;
}
location /tx/ {
    alias $pages_dir/tx/;
    index index.html;
    try_files $uri $uri/ /tx/index.html;
}
location /tioim/ {
    alias $pages_dir/tioim/;
    index index.html;
    try_files $uri $uri/ /tioim/index.html;
}

location /tioims/ {
    alias $pages_dir/tioims/;
    index index.html;
    try_files $uri $uri/ /tioims/index.html;
}

# 访问 nginx本地
location / {
    etag on;
    root $pages_dir;
    error_page 404 =200 /2/error/page404.html;
    error_page 500 502 503 504 =200 /2/error/page502.html;
    index index.html index.htm;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    expires 12h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}


#    =      严格匹配。如果请求匹配这个location，那么将停止搜索并立即处理此请求
#    ~      区分大小写匹配(可用正则表达式)
#    ~*     不区分大小写匹配(可用正则表达式)
#    !~     区分大小写不匹配
#    !~*    不区分大小写不匹配
#    ^~     如果把这个前缀用于一个常规字符串,那么告诉nginx 如果路径匹配那么不测试正则表达式
#    . ： 匹配除换行符以外的任意字符
#    ? ： 重复0次或1次
#    + ： 重复1次或更多次
#    * ： 重复0次或更多次
#    \d ：匹配数字
#    ^ ： 匹配字符串的开始
#    $ ： 匹配字符串的介绍
#    {n} ： 重复n次
#    {n,} ： 重复n次或更多次
#    [c] ： 匹配单个字符c
#    [a-z] ： 匹配a-z小写字母的任意一个
#
