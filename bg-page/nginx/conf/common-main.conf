


add_header Access-Control-Allow-Origin *;
add_header Access-Control-Allow-Headers *;
add_header Access-Control-Allow-Methods GET,POST,OPTIONS;

add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";
add_header X-Frame-Options $X_Frame_Options;
add_header X-Content-Type-Options nosniff;
add_header X-XSS-Protection "1; mode=block";

#首页重定向
rewrite ^\/index.html$ /1/tm.html last;
# 博客重定向
rewrite ^\/(\d+?)$ /blog/r/index.html?id=$1 last;
# 文档重定向
rewrite ^\/doc\/([a-zA-Z0-9]+?)\/(\d+?)$ /doc/$1/index.html?id=$2 last;
rewrite ^\/doc\/(\d+?)$ /doc/tio/index.html?id=$1 last;

rewrite ^\/u\/(\d+?)$ /u/index.html?id=$1 last;

# 新案例重定向 / 新博客重定向 / 书籍重定向 / 旧博客查看定向
rewrite ^\/([1-9]+?)\/case\/(\d+?)$ /$1/case/caseInfo.html?id=$2 last;
rewrite ^\/([1-9]+?)\/blog\/(\d+?)$ /$1/blog/blogInfo.html?id=$2 last;
rewrite ^\/([1-9]+?)\/book\/(\d+?)$ /$1/book/bookInfo.html?id=$2 last;
rewrite ^\/([1-9]+?)\/view\/(\d+?)$ /$1/blog/view.html?id=$2 last;
# 简单版新博客查看定向
rewrite ^\/view\/(\d+?)$ /2/blog/view.html?id=$1 last;


# rewrite "^\/baidu\/xxl\/kqgs\/{1}$" /case/ last;
# rewrite "^\/baidu\/xxl\/kqgs\/index.html{1}$" /case/index.html last;
# 访问 http_server_api
# ~   开头表示区分大小写的正则匹配
location ~ /(api/|mytio/) {
    proxy_pass $http_server_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Real-PORT $remote_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;

    expires -1;
}

