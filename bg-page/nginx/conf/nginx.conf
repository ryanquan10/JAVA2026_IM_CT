# worker_processes auto;
worker_processes 4;
worker_rlimit_nofile 51200;

events {
    #use epoll;
    worker_connections 51200;
    multi_accept on;
}


http {
    include black.ip; #黑名单
    include mime.types;
    default_type application/octet-stream;
    server_names_hash_bucket_size 128;
    large_client_header_buffers 4 32k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120s 120s;
    keepalive_requests 10000;
    server_tokens off; # off 隐藏nginx版本号, on 显示nginx版本号
    underscores_in_headers on; # on 有下划线的头也传过去

    open_file_cache max=100000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;


    client_max_body_size 200m; # 文件大小限制，默认1m
    client_header_timeout 1m;
    client_body_timeout 10m;
    proxy_connect_timeout 1m;
    proxy_read_timeout 5m;
    proxy_send_timeout 10m;
    # proxy_ignore_client_abort on;

    ssl_session_timeout 3h;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_session_cache builtin:3000 shared:SSL:30m;
    ssl_session_tickets on;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 114.114.114.114 119.29.29.29 223.5.5.5 valid=300s; # 指定DNS
    resolver_timeout 5s;

    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 64k;
    fastcgi_buffers 4 64k;
    fastcgi_busy_buffers_size 128k;
    fastcgi_temp_file_write_size 256k;
    fastcgi_intercept_errors on;

    etag on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_buffers 16 16k;
    gzip_http_version 1.1;
    gzip_comp_level 8;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/xml;
    gzip_proxied expired no-cache no-store private auth;
    gzip_disable "MSIE [1-6]\.";


    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;


    log_format main '$remote_addr [$time_iso8601] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" "$request_body"';

    access_log logs/access.txt main;


    # 把http跳转到https
    server {
        include vars.conf;
        listen 80;
        server_name local.tiocloud.com 127.0.0.1;
        return 301 https://$server_name$request_uri;
    }


    server {
        include vars.conf;

        listen 443 ssl http2;
        server_name local.tiocloud.com;

        proxy_pass_header Server;

        ssl_certificate cert/tiocloud/fullchain.crt;
        ssl_certificate_key cert/tiocloud/private.pem;
		
        include common-ssl.conf;
        include common-main.conf;
    }


    include server/*.conf;
}
